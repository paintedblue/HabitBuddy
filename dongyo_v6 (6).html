<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>동요 친구</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#D8F5E8;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif,'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji'}
img.emoji{height:1em;width:1em;margin:0 .04em;vertical-align:-0.1em;display:inline-block}
.W{position:relative;width:780px;height:580px;border-radius:26px;overflow:hidden;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif,'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji';color:#1E1E1E;transition:background .5s;box-shadow:0 22px 64px rgba(0,0,0,.16)}
.dc{position:absolute;border-radius:50%;pointer-events:none}
.abar{position:absolute;top:0;left:0;right:0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;z-index:5}
.cbtn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.85);border:.5px solid rgba(0,0,0,.1);border-radius:22px;padding:7px 13px 7px 11px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;color:#1E1E1E;transition:background .15s}
.cbtn:hover{background:rgba(255,255,255,.98)}
.spil{background:rgba(255,255,255,.85);border-radius:22px;padding:7px 15px;font-size:14px;font-weight:700}
.bub{position:absolute;left:50%;top:10%;transform:translateX(-50%);background:white;border:.5px solid rgba(0,0,0,.1);border-radius:18px;padding:10px 22px;font-size:19px;font-weight:800;color:#1E1E1E;pointer-events:none;z-index:4;transition:left .4s cubic-bezier(.4,0,.2,1);max-width:400px;text-align:center;line-height:1.35}
.bub.sh{left:30%}
.bub::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);border:10px solid transparent;border-top-color:white;border-bottom:none}
.cmp{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);z-index:3;transition:left .4s cubic-bezier(.4,0,.2,1)}
.cmp.sh{left:30%}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes exc{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-13px) rotate(4deg)}}
@keyframes swy{0%,100%{transform:rotate(-11deg)}50%{transform:rotate(11deg)}}
@keyframes cel{0%{transform:scale(1)}25%{transform:scale(1.2) rotate(-9deg)}75%{transform:scale(1.2) rotate(9deg)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes notedrift{0%,100%{transform:translateY(0) scale(1);opacity:1}50%{transform:translateY(-8px) scale(1.1);opacity:.6}}
.an-b{animation:bob 3.2s ease-in-out infinite}
.an-e{animation:exc .85s ease-in-out infinite}
.an-s{animation:swy .9s ease-in-out infinite}
.an-c{animation:cel .7s ease-in-out 4}
.dock{position:absolute;bottom:0;left:0;right:0;padding:10px 22px 15px;display:flex;gap:11px;justify-content:center;background:rgba(255,255,255,.92);border-top:.5px solid rgba(0,0,0,.06);z-index:5}
.db{flex:1;max-width:170px;padding:12px 8px;border-radius:18px;border:3px solid transparent;cursor:pointer;font-size:13px;font-weight:800;display:flex;flex-direction:column;align-items:center;gap:5px;transition:transform .15s,border-color .2s;font-family:inherit;line-height:1.3}
.db i{font-size:26px}
.db:active{transform:scale(.94)}
.d1{background:#DCF1FF;color:#0E68AB}
.d2{background:#DFFAEA;color:#0A7840}
.d3{background:#FFF0DC;color:#A05A00}
.pnl{position:absolute;right:0;top:0;height:100%;width:0;background:white;border-left:.5px solid rgba(0,0,0,.08);border-radius:0 26px 26px 0;overflow:hidden;transition:width .38s cubic-bezier(.4,0,.2,1);z-index:6}
.pnl.op{width:310px}
.pin{width:310px;height:100%;overflow-y:auto;padding:17px 16px 95px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ptit{font-size:16px;font-weight:800;color:#1E1E1E}
.px{background:none;border:none;cursor:pointer;color:#888;font-size:21px;padding:4px;border-radius:8px;line-height:1;font-family:inherit}
.px:hover{background:#F0F0F0}
.sdots{display:flex;gap:8px;justify-content:center;margin-bottom:16px;align-items:center}
.big-inp{width:100%;padding:17px;border-radius:18px;border:3px solid rgba(0,0,0,.1);font-size:22px;font-family:inherit;color:#1E1E1E;background:white;outline:none;text-align:center;margin-bottom:6px}
.big-inp:focus{border-color:#48CA02}
.big-inp::placeholder{color:#CCC;font-size:18px}
.big-next{width:100%;padding:17px;border-radius:18px;border:none;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;color:white;margin-top:12px;transition:filter .15s,transform .1s}
.chgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.chbtn{padding:18px 8px 16px;border-radius:18px;border:3px solid rgba(0,0,0,.08);background:#F6F6F4;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;font-size:16px;font-weight:800;font-family:inherit;color:#1E1E1E;transition:all .18s;width:100%}
.chbtn .cem{font-size:36px;line-height:1;display:flex;align-items:center;justify-content:center;height:40px}
.chbtn:hover{background:#EFEFED}
.colgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.colsw{aspect-ratio:1;border-radius:16px;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:9px;border:4px solid transparent;transition:all .18s}
.colsw:hover{transform:scale(1.06)}
.colsw.sl{border-color:#1E1E1E;transform:scale(1.1)}
.col-lbl{font-size:12px;color:white;font-weight:800;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.abtn{width:100%;padding:15px;border-radius:16px;border:none;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;color:white;margin-top:14px;transition:filter .15s,transform .1s}
.abtn:hover{filter:brightness(.9)}
.abtn:active{transform:scale(.97)}
.altb{width:100%;padding:12px;border-radius:14px;border:2.5px solid rgba(0,0,0,.1);background:white;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#666;margin-top:10px}
.altb:hover{background:#F0F0F0}
.di-btn{width:100%;padding:13px;border-radius:14px;border:2.5px dashed rgba(0,0,0,.16);background:transparent;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#888;margin-top:10px;transition:all .15s}
.di-btn:hover{background:#F0F0EE;border-style:solid;color:#444}
.hg{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.hc{padding:15px 10px 13px;border-radius:18px;cursor:pointer;text-align:center;border:3px solid transparent;transition:all .18s;font-family:inherit;width:100%}
.hc:hover{filter:brightness(.95);border-color:rgba(0,0,0,.15)}
.hem{font-size:36px;margin-bottom:6px;line-height:1;display:flex;align-items:center;justify-content:center;height:42px}
.hnm{font-size:16px;font-weight:800;color:#1E1E1E}
.htm{font-size:13px;color:#888;font-weight:600;margin-top:3px}
.cag{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:13px}
.cdl{text-align:center;font-size:11px;color:#888;font-weight:700;padding:4px 0}
.cdy{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F0F0EE}
.cdy.mt{background:transparent}
.cdy .ds{font-size:14px;line-height:1.2}
.cdy .dn{font-size:10px;color:#888;font-weight:600;line-height:1}
.ov{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .28s,visibility .28s}
.ov.hid{opacity:0;visibility:hidden;pointer-events:none}
.og{display:flex;gap:13px;justify-content:center}
.co{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;padding:13px 15px;border-radius:20px;border:3.5px solid transparent;background:rgba(255,255,255,.75);transition:all .2s}
.co:hover{background:rgba(255,255,255,.97)}
.co.sl{background:white}
.cnm{font-size:14px;font-weight:800;color:#1E1E1E}
.ctp{font-size:12px;color:#888;font-weight:600}
.cok{padding:14px 35px;border-radius:26px;border:none;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;color:white;transition:filter .15s}
.cok:hover{filter:brightness(.9)}
/* Habit overlay */
.hov{position:absolute;inset:0;z-index:15;display:flex;flex-direction:column;align-items:center;transition:opacity .35s,visibility .35s}
.hov.hid{opacity:0;visibility:hidden;pointer-events:none}
.hov-top{width:100%;flex-shrink:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 22px}
.hov-body{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:0 28px;overflow:hidden}
.hov-bot{width:100%;flex-shrink:0;padding:8px 24px 18px;display:flex;flex-direction:column;gap:9px}
.hov-dots{display:flex;gap:8px;align-items:center}
.hov-exit{background:rgba(255,255,255,.82);border:none;border-radius:22px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;color:#1E1E1E;display:flex;align-items:center;gap:6px;transition:background .15s}
.hov-exit:hover{background:rgba(255,255,255,.98)}
.song-card{background:rgba(255,255,255,.85);border-radius:18px;padding:13px 20px;width:100%;max-width:430px;text-align:center}
.song-card-lbl{font-size:12px;font-weight:700;color:#888;margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:6px}
.song-card-ttl{font-size:16px;font-weight:800;color:#1E1E1E}
.playing-dot{width:8px;height:8px;border-radius:50%;display:inline-block;animation:pulse 1.2s ease-in-out infinite}
.note-float{font-size:18px;animation:notedrift 1.8s ease-in-out infinite;display:inline-block}
.note-float:nth-child(2){animation-delay:.6s}
.note-float:nth-child(3){animation-delay:1.2s}
.hov-timer-wrap{position:relative;width:158px;height:158px;flex-shrink:0}
.hov-timer-wrap svg{width:100%;height:100%}
.hov-timer-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hov-tnum{font-size:36px;font-weight:800;color:#1E1E1E;line-height:1}
.hov-tlbl{font-size:11px;color:#888;font-weight:600;margin-top:3px}
.hov-lyr{background:rgba(255,255,255,.78);border-radius:16px;padding:13px 20px;width:100%;max-width:430px;text-align:center;font-size:15px;font-weight:700;color:#333;line-height:1.9}
.hov-big-btn{width:100%;padding:17px;border-radius:18px;border:none;font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;color:white;transition:filter .15s,transform .1s}
.hov-big-btn:hover{filter:brightness(.9)}
.hov-big-btn:active{transform:scale(.97)}
.hov-alt-btn{width:100%;padding:13px;border-radius:14px;border:2.5px solid rgba(0,0,0,.12);background:rgba(255,255,255,.75);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#444;transition:background .15s}
.hov-alt-btn:hover{background:rgba(255,255,255,.97)}
.hov-demo{font-size:11px;font-weight:700;color:rgba(0,0,0,.3);text-align:center}

/* ══ SEQUENCE OVERLAY ══ */
.seq-ov{position:absolute;inset:0;z-index:16;overflow:hidden;transition:opacity .4s,visibility .4s}
.seq-ov.hid{opacity:0;visibility:hidden;pointer-events:none}
/* Scene halves */
.seq-room{position:absolute;top:0;left:0;width:52%;height:100%;overflow:hidden}
.seq-bath{position:absolute;top:0;right:0;width:52%;height:100%;overflow:hidden}
/* Door frame between scenes */
.seq-door-wrap{position:absolute;top:0;left:calc(52% - 32px);width:64px;height:100%;z-index:1}
.seq-door-frame{position:absolute;inset:0;background:#C8A06A}
.seq-door-panel{position:absolute;top:0;left:7px;right:7px;bottom:0;background:#B88A50}
.seq-door-arch{position:absolute;top:0;left:5px;right:5px;height:40px;background:#C8A06A;border-radius:0 0 50% 50%}
.seq-door-handle{position:absolute;right:14px;top:48%;width:9px;height:9px;border-radius:50%;background:#8B6914}
.seq-door-hinge-t{position:absolute;left:10px;top:15%;width:6px;height:14px;background:#A88040;border-radius:2px}
.seq-door-hinge-b{position:absolute;left:10px;top:70%;width:6px;height:14px;background:#A88040;border-radius:2px}
/* Character */
.seq-cw{position:absolute;bottom:110px;left:60px;transition:none;z-index:3}
.seq-cw-inner{position:relative;display:inline-block}
.seq-bub{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%) translateY(8px) scale(.9);background:white;border:.5px solid rgba(0,0,0,.1);border-radius:16px;padding:9px 16px;font-size:15px;font-weight:800;white-space:nowrap;color:#1E1E1E;opacity:0;transition:opacity .4s,transform .4s;pointer-events:none}
.seq-bub.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
.seq-bub::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:9px solid transparent;border-top-color:white;border-bottom:none}
.seq-note{position:absolute;font-size:20px;animation:notedrift 1.6s ease-in-out infinite;opacity:0;transition:opacity .3s}
.seq-note.show{opacity:1}
.seq-wave{position:absolute;right:-18px;top:8px;font-size:28px;opacity:0;transform:rotate(-20deg);transition:opacity .3s;transform-origin:bottom center}
.seq-wave.show{opacity:1;animation:waveHand .5s ease-in-out infinite}
@keyframes waveHand{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(25deg)}}
@keyframes walkBob{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-10px) rotate(-2deg)}75%{transform:translateY(-10px) rotate(2deg)}}
.seq-walking{animation:walkBob .46s ease-in-out infinite}
@keyframes beckonBounce{0%,100%{transform:scale(1)}40%{transform:scale(1.1) translateX(7px)}70%{transform:scale(1.05) translateX(3px)}}
.seq-beckoning{animation:beckonBounce .9s ease-in-out 3}
/* Walking leg/arm swing — uses transform-box: fill-box for correct SVG pivot */
.seq-ll{transform-box:fill-box;transform-origin:50% 0%}
.seq-lr{transform-box:fill-box;transform-origin:50% 0%}
.seq-al{transform-box:fill-box;transform-origin:50% 0%}
@keyframes legSwL{0%,100%{transform:rotate(14deg)}50%{transform:rotate(-14deg)}}
@keyframes legSwR{0%,100%{transform:rotate(-14deg)}50%{transform:rotate(14deg)}}
@keyframes armSwL{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
.walk-ll{animation:legSwL .46s ease-in-out infinite}
.walk-lr{animation:legSwR .46s ease-in-out infinite}
.walk-al{animation:armSwL .46s ease-in-out infinite}
/* Footprints */
.seq-fp{position:absolute;font-size:20px;opacity:0;transition:opacity .35s}
/* Topbar */
.seq-topbar{position:absolute;top:0;left:0;right:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;z-index:4}
.seq-title{font-size:14px;font-weight:700;color:rgba(0,0,0,.4)}
.seq-exit-btn{background:rgba(255,255,255,.82);border:none;border-radius:22px;padding:7px 14px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;color:#1E1E1E}
/* Phase dots */
.seq-phase-dots{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;z-index:4}
/* Bathroom arrival cue box */
.seq-cue-box{position:absolute;right:80px;bottom:118px;background:rgba(255,255,255,.9);border-radius:16px;padding:12px 16px;font-size:13px;font-weight:700;color:#1E1E1E;opacity:0;transition:opacity .5s;text-align:center;max-width:150px;border:.5px solid rgba(0,0,0,.1);z-index:3}
.seq-cue-box.show{opacity:1}
/* CTA */
.seq-cta{position:absolute;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);text-align:center;opacity:0;transition:opacity .5s,transform .5s;pointer-events:none;z-index:4}
.seq-cta.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.seq-cta-btn{padding:16px 40px;border-radius:24px;border:none;font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;color:white;box-shadow:0 6px 20px rgba(0,0,0,.15);transition:filter .15s,transform .1s}
.seq-cta-btn:hover{filter:brightness(.9)}
.seq-cta-btn:active{transform:scale(.97)}
.seq-cta-hint{font-size:13px;font-weight:600;color:rgba(0,0,0,.4);margin-top:8px}
/* ── Brushing action animations ── */
@keyframes brushAct{0%,100%{transform:translateX(-13px)}50%{transform:translateX(13px)}}
@keyframes foamRise{0%{opacity:0;transform:translateY(0) scale(.4)}45%{opacity:.82;transform:translateY(-6px) scale(1.05)}100%{opacity:0;transform:translateY(-16px) scale(1.35)}}
@keyframes teethShow{0%,100%{opacity:.85}50%{opacity:1}}
</style>
</head>
<body>
<div class="W" id="W">
<div id="bgd"></div>
<div class="abar">
  <div style="font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px"><i class="ti ti-music" style="font-size:18px"></i>동요 친구</div>
  <div style="display:flex;align-items:center;gap:9px">
    <button class="cbtn" id="cbtn" onclick="showO()"><span id="cbnm">토리</span><i class="ti ti-chevron-down" style="font-size:12px"></i></button>
    <div class="spil">⭐ <span id="sv">14</span></div>
  </div>
</div>
<div class="bub" id="bub">안녕 친구! 오늘은 뭘 해볼까요? 😊</div>
<div class="cmp" id="cmp"><div id="can" class="an-b"><div id="csv"></div></div></div>
<div class="dock">
  <button class="db d1" id="bp" onclick="oP('p')"><i class="ti ti-user-heart"></i>나에 대해<br>알려줘</button>
  <button class="db d2" id="bh" onclick="oP('h')"><i class="ti ti-rocket"></i>같이<br>해봐요!</button>
  <button class="db d3" id="bc" onclick="oP('c')"><i class="ti ti-calendar-heart"></i>내<br>도장판</button>
</div>
<div class="pnl" id="pnl"><div class="pin"><div class="ph"><span class="ptit" id="pt"></span><button class="px" onclick="cP()"><i class="ti ti-x"></i></button></div><div id="pb"></div></div></div>
<div class="ov hid" id="ov">
  <div style="font-size:18px;font-weight:800;color:#1E1E1E">함께할 친구를 골라봐요! 🐾</div>
  <div class="og" id="og"></div>
  <button class="cok" id="cok" onclick="hideO()">선택 완료! 🎉</button>
</div>
<div class="hov hid" id="hov">
  <div class="hov-top"><div class="hov-dots" id="hov-dots"></div><button class="hov-exit" id="hov-exit"></button></div>
  <div class="hov-body" id="hov-body"></div>
  <div class="hov-bot" id="hov-bot"></div>
</div>

<!-- ══ SEQUENCE OVERLAY ══ -->
<div class="seq-ov hid" id="seq-ov">

  <!-- ROOM (left side) — SVG-drawn scene -->
  <div class="seq-room">
    <svg viewBox="0 0 407 580" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="woodFloor" x="0" y="0" width="80" height="22" patternUnits="userSpaceOnUse">
          <rect width="80" height="22" fill="#C89060"/>
          <rect width="80" height="22" fill="none" stroke="#A87040" stroke-width="1.5" stroke-opacity=".5"/>
          <line x1="0" y1="0" x2="0" y2="22" stroke="#9A6030" stroke-width="1" stroke-opacity=".35"/>
        </pattern>
      </defs>
      <!-- Wall -->
      <rect width="407" height="430" fill="#FFF0DC"/>
      <!-- Subtle wall wainscoting -->
      <rect x="0" y="310" width="407" height="6" fill="#F0D8B8" opacity=".7"/>
      <rect x="0" y="310" width="407" height="120" fill="#FAE8D0" opacity=".35"/>

      <!-- WINDOW -->
      <rect x="36" y="30" width="138" height="168" rx="5" fill="#B8E4FF"/>
      <!-- Sky gradient feel -->
      <rect x="36" y="30" width="138" height="60" fill="#C8EDFF" opacity=".5"/>
      <!-- Clouds -->
      <ellipse cx="72" cy="72" rx="26" ry="12" fill="white" opacity=".88"/>
      <ellipse cx="90" cy="65" rx="18" ry="12" fill="white" opacity=".88"/>
      <ellipse cx="140" cy="85" rx="22" ry="11" fill="white" opacity=".88"/>
      <ellipse cx="124" cy="78" rx="15" ry="10" fill="white" opacity=".88"/>
      <!-- Sun -->
      <circle cx="152" cy="47" r="18" fill="#FFD740" opacity=".78"/>
      <circle cx="152" cy="47" r="12" fill="#FFE066" opacity=".6"/>
      <!-- Tree tops outside -->
      <ellipse cx="55" cy="175" rx="18" ry="24" fill="#6DB85A" opacity=".7"/>
      <ellipse cx="42" cy="182" rx="14" ry="18" fill="#5AA848" opacity=".6"/>
      <!-- Window frame -->
      <rect x="30" y="24" width="150" height="180" rx="7" fill="none" stroke="#C4A060" stroke-width="9"/>

  /* Phase 2: walk toward door */

  var eb=document.getElementById('hov-exit');eb.innerHTML='⏸ 잠깐 쉬어요';eb.onclick=pauseHov;eb.style.display='';
  var ci=251.3;var m=Math.floor(S.ti/60);var sc=(S.ti%60).toString().padStart(2,'0');
  document.getElementById('hov-body').innerHTML=
    '<div class="song-card" style="padding:10px 18px"><div class="song-card-lbl"><span class="playing-dot" style="background:'+c.acc+'"></span>이행 동요 재생 중<span class="note-float">🎧</span><span class="note-float">🎵</span></div>'+
    '<div class="song-card-ttl" style="font-size:15px">'+pr(h.ply)+'</div></div>'+
    '<div style="display:flex;align-items:center;justify-content:center;gap:28px">'+
      /* 양치하기는 brushing SVG, 나머지는 일반 sway */
      '<div class="'+(h.id==='br'?'an-b':'an-s')+'">'+((h.id==='br')?gSBrush(S.c,115):gS(S.c,105))+'</div>'+
      '<div class="hov-timer-wrap"><svg viewBox="0 0 100 100" style="transform:rotate(-90deg)">'+
        '<circle cx="50" cy="50" r="40" fill="none" stroke="rgba(0,0,0,.1)" stroke-width="8"/>'+
        '<circle cx="50" cy="50" r="40" fill="none" stroke="'+c.acc+'" stroke-width="8" stroke-dasharray="'+ci+'" stroke-dashoffset="'+ci+'" stroke-linecap="round" id="hov-arc"/>'+
      '</svg><div class="hov-timer-txt"><div class="hov-tnum" id="hov-tnum">'+m+':'+sc+'</div><div class="hov-tlbl">남은 시간</div></div></div>'+
    '</div>'+
    '<div class="hov-lyr">'+h.lyr.replace(/\n/g,'<br>')+'</div>';
  document.getElementById('hov-bot').innerHTML='<div class="hov-demo">데모 모드 · '+h.dt+'초 (실제 약 '+Math.floor(h.rt/60)+'분)</div>';
}
function rHovDn(c){
  var h=S.hab;sB(nm()+ya()+', 정말 잘했어요! 🌟');
  document.getElementById('hov-exit').style.display='none';
  document.getElementById('hov-body').innerHTML=
    '<div style="font-size:54px;line-height:1">⭐⭐</div>'+
    '<div style="font-size:24px;font-weight:800">'+nm()+ya()+', 잘했어요!</div>'+
    '<div style="font-size:16px;font-weight:700;color:'+c.acc+'">'+h.nm+' 완료! 🎉</div>'+
    '<div style="font-size:14px;font-weight:600;color:#666">별 2개 획득! 지금까지 총 '+S.st+'개 🌟</div>'+
    '<div id="done-char" class="an-c">'+gS(S.c,138)+'</div>';
  setTimeout(function(){var el=document.getElementById('done-char');if(el)el.className='an-b';},3200);
  document.getElementById('hov-bot').innerHTML=
    '<button class="hov-big-btn" style="background:'+c.acc+'" onclick="oP(\'c\');exitHov()">📅 도장판 보러 가기!</button>'+
    '<button class="hov-alt-btn" onclick="exitHov()">다른 습관도 해볼까요?</button>';
}
function startHov(){
  S.ti=S.hab.dt;S.tm=S.hab.dt;S.hov='doing';rHov();
  S.int=setInterval(function(){S.ti--;updHovT();
    if(S.ti<=0){clearInterval(S.int);S.int=null;S.hov='done';S.st+=2;document.getElementById('sv').textContent=S.st;rHov();}
  },1000);
}
function updHovT(){
  if(S.hov!=='doing')return;
  var ci=251.3,pg=(S.tm-S.ti)/S.tm;
  var arc=document.getElementById('hov-arc'),nu=document.getElementById('hov-tnum');
  if(arc)arc.setAttribute('stroke-dashoffset',(ci*(1-pg)).toFixed(1));
  if(nu)nu.textContent=Math.floor(S.ti/60)+':'+(S.ti%60).toString().padStart(2,'0');
}
function pauseHov(){if(S.int){clearInterval(S.int);S.int=null;}S.hov='ready';rHov();}
function exitHov(){
  if(S.int){clearInterval(S.int);S.int=null;}
  S.hov=null;S.hab=null;
  document.getElementById('hov').classList.add('hid');
  document.getElementById('hov-exit').style.display='';
  sA('an-b');sB('안녕 '+nm()+'! 오늘은 뭘 해볼까요? 😊');
}
function rCal(){
  sA('an-b');sB(nm()+'의 도장판이에요! 📅');
  var c=CH[S.c];var days=['일','월','화','수','목','금','토'];
  var dl=days.map(function(d){return '<div class="cdl">'+d+'</div>';}).join('');
  var em2='';for(var i=0;i<5;i++)em2+='<div class="cdy mt"></div>';
  var cells='';
  for(var d=1;d<=31;d++){
    var td=d===14,cs=CAL[d];
    var st2=cs&&cs.length>0?(HB.find(function(h){return h.id===cs[0];})||{em:''}).em:'';
    cells+='<div class="cdy" style="'+(td?'outline:2.5px solid '+c.acc+';outline-offset:-2px':'')+(cs&&cs.length>0?';background:'+c.bg:'')+'">'+(cs&&cs.length>0?'<div class="ds">'+st2+'</div>':'')+'<div class="dn">'+(td?'<b style="color:'+c.dk+'">'+d+'</b>':d)+'</div></div>';
  }
  document.getElementById('pb').innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><span style="font-size:16px;font-weight:800">2026년 5월 📅</span><span style="font-size:13px;font-weight:700;color:#888">오늘 14일</span></div>'+
    '<div class="cag">'+dl+em2+cells+'</div>'+
    '<div style="background:#F0F0EE;border-radius:16px;padding:13px 16px;display:flex;align-items:center;gap:13px;margin-bottom:12px"><span style="font-size:28px">🔥</span><div><div style="font-size:19px;font-weight:800">5일 연속!</div><div style="font-size:13px;font-weight:700;color:#888">'+nm()+'의 연속 기록이에요 💪</div></div></div>'+
    '<div style="font-size:15px;font-weight:700;color:#888;text-align:center">⭐ 총 '+S.st+'개의 별을 모았어요!</div>';
}
function showO(){
  var c=CH[S.c];var ov=document.getElementById('ov');
  ov.style.background=c.bg+'EF';
  document.getElementById('og').innerHTML=CH.map(function(ch){return '<div class="co'+(ch.id===S.c?' sl':'')+'" onclick="selC('+ch.id+')" style="border-color:'+(ch.id===S.c?ch.acc:'transparent')+'">'+gS(ch.id,76)+'<div class="cnm">'+ch.nm+'</div><div class="ctp">'+ch.tp+'</div></div>';}).join('');
  document.getElementById('cok').style.background=c.acc;
  ov.classList.remove('hid');setTimeout(function(){emP(document.getElementById('W'));},30);
}
function selC(id){
  S.c=id;var c=CH[id];
  document.querySelectorAll('.co').forEach(function(el,i){el.classList.toggle('sl',i===id);el.style.borderColor=i===id?c.acc:'transparent';});
  document.getElementById('ov').style.background=c.bg+'EF';
  document.getElementById('cok').style.background=c.acc;
}
function hideO(){document.getElementById('ov').classList.add('hid');apT();if(S.pan)rP();}
apT();setTimeout(function(){emP(document.getElementById('W'));},120);
